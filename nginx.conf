# nginx.conf — Reverse proxy hardened pour ShopSafe
# Rôle : TLS termination, rate limiting, headers de sécurité supplémentaires

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Ne pas exposer la version de nginx
    server_tokens off;

    # Logs au format JSON pour le SIEM
    log_format json_combined escape=json
        '{"ts":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"ua":"$http_user_agent",'
        '"duration":$request_time}';

    access_log /var/log/nginx/access.log json_combined;

    # Rate limiting global — protection DDoS et brute force
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;

    # Limitation de la taille des requêtes
    client_max_body_size 1m;
    client_body_timeout  10s;
    client_header_timeout 10s;

    # Timeouts
    keepalive_timeout  65;
    send_timeout       10s;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    server {
        listen 80;
        server_name shopsafe.example.com;

        # Redirection HTTPS systématique
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name shopsafe.example.com;

        # ── TLS ─────────────────────────────────────────────────
        ssl_certificate     /etc/ssl/certs/shopsafe.crt;
        ssl_certificate_key /etc/ssl/private/shopsafe.key;

        # Protocoles sécurisés uniquement
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Session TLS
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;

        # ── Headers de sécurité ──────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "DENY"    always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # ── Rate limiting par route ──────────────────────────────
        location /login {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://app:8080;
            include /etc/nginx/proxy_params;
        }

        location /register {
            limit_req zone=login burst=2 nodelay;
            proxy_pass http://app:8080;
            include /etc/nginx/proxy_params;
        }

        location / {
            limit_req zone=global burst=20 nodelay;
            proxy_pass http://app:8080;
            include /etc/nginx/proxy_params;
        }

        # ── Bloquer les fichiers sensibles ───────────────────────
        location ~ /\.(env|git|semgrep|yml)$ {
            deny all;
            return 404;
        }

        location ~ \.(py|db|log|cfg|ini)$ {
            deny all;
            return 404;
        }

        # Page d'erreur personnalisée (sans info technique)
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
    }
}
